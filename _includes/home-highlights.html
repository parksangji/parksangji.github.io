{% include lang.html %}

<!-- 홈 상단: 활동 잔디 (블로그 글 + 실제 GitHub 기여) -->
<section id="home-highlights" class="mb-4">
  <div class="card reveal">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fs-5 mb-0"><i class="fa-solid fa-seedling fa-fw me-1"></i>활동 잔디</h2>
        <a class="small" href="{{ '/archives/' | relative_url }}">아카이브 전체 보기 →</a>
      </div>

      <!-- 블로그 글 잔디 (글 작성일로 생성) -->
      <div class="grass-block">
        <div class="grass-label">📝 블로그 글 (최근 1년)</div>
        <div id="blog-heatmap" class="heatmap"></div>
      </div>

      <!-- 실제 GitHub 잔디 (htmlproofer 회피 위해 JS로 주입) -->
      <div class="grass-block mt-3">
        <div class="grass-label">🐙 GitHub 기여 (@parksangji)</div>
        <a id="gh-grass-link" href="https://github.com/parksangji"
           target="_blank" rel="noopener noreferrer" aria-label="GitHub 프로필"></a>
      </div>
    </div>
  </div>
</section>

<script>
  window.BLOG_POST_DATES = [
    {% for post in site.posts %}"{{ post.date | date: '%Y-%m-%d' }}"{% unless forloop.last %},{% endunless %}{% endfor %}
  ];
</script>

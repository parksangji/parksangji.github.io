<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <clipPath id="ball"><circle cx="120" cy="120" r="110"/></clipPath>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 몸체 -->
  <g clip-path="url(#ball)">
    <rect x="0" y="0" width="240" height="120" fill="#ee1515"/>
    <rect x="0" y="120" width="240" height="120" fill="#f6f6f6"/>
    <rect x="0" y="104" width="240" height="32" fill="#161616"/>
    <rect x="0" y="0" width="240" height="240" fill="url(#sheen)"/>
  </g>

  <!-- 외곽선 -->
  <circle cx="120" cy="120" r="110" fill="none" stroke="#161616" stroke-width="10"/>

  <!-- 가운데 버튼 -->
  <circle cx="120" cy="120" r="38" fill="#161616"/>
  <circle cx="120" cy="120" r="26" fill="#f6f6f6" stroke="#161616" stroke-width="5"/>
  <circle cx="120" cy="120" r="11" fill="#ffffff" stroke="#cfcfcf" stroke-width="2"/>
</svg>

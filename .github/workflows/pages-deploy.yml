name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 임베딩 모델(약 50MB) 캐시 → 매 배포마다 재다운로드 방지
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: tools/ai/.model-cache
          key: hf-multilingual-e5-small-q8-v1

      # AI 시맨틱 검색 인덱스 생성 (로컬 모델, 외부 API·키 없음). jekyll 빌드 전에 실행해 항상 최신 유지.
      - name: Build AI search index
        run: |
          cd tools/ai
          npm install --no-audit --no-fund
          node build-index.mjs

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 배포 성공 후, 이번 푸시에서 추가·수정된 글 URL만 IndexNow로 제출.
  # → Bing/Naver/Yandex 등 IndexNow 지원 엔진에 즉시 크롤링 요청 (Google은 미지원).
  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Submit changed posts to IndexNow
        env:
          INDEXNOW_KEY: f52013fbefe4ab3f07798eb7def101ac
          SITE: https://parksangji.github.io
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # 새 브랜치/최초 푸시(before가 0으로 채워짐)면 직전 커밋과 비교
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${AFTER}^!"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi
          FILES=$(git diff --name-only --diff-filter=AM "$RANGE" -- '_posts/*.md' || true)
          if [ -z "$FILES" ]; then
            echo "변경된 글 없음 — IndexNow 제출 생략."
            exit 0
          fi
          # 파일명(YYYY-MM-DD-slug.md) → https://<site>/posts/<slug>/
          URLS=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            slug=$(basename "$f" .md | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-//')
            URLS+=("$SITE/posts/$slug/")
          done <<< "$FILES"
          echo "제출 대상 ${#URLS[@]}건:"; printf ' - %s\n' "${URLS[@]}"
          URLLIST=$(printf '%s\n' "${URLS[@]}" | jq -R . | jq -s .)
          BODY=$(jq -n \
            --arg host "parksangji.github.io" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "$SITE/$INDEXNOW_KEY.txt" \
            --argjson urlList "$URLLIST" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')
          echo "$BODY"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" -w "\nIndexNow HTTP %{http_code}\n"

name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 임베딩 모델(약 50MB) 캐시 → 매 배포마다 재다운로드 방지
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: tools/ai/.model-cache
          key: hf-multilingual-e5-small-q8-v1

      # AI 시맨틱 검색 인덱스 생성 (로컬 모델, 외부 API·키 없음). jekyll 빌드 전에 실행해 항상 최신 유지.
      - name: Build AI search index
        run: |
          cd tools/ai
          npm install --no-audit --no-fund
          node build-index.mjs

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 배포 성공 후 IndexNow로 크롤링 요청 (Bing/Naver/Yandex 등 — Google은 미지원).
  #  - push 이벤트: 이번 푸시에서 추가·수정된 글 URL만 제출
  #  - 수동 실행(workflow_dispatch): 배포된 sitemap.xml의 전체 URL을 일괄 제출
  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Submit URLs to IndexNow
        env:
          INDEXNOW_KEY: f52013fbefe4ab3f07798eb7def101ac
          SITE: https://parksangji.github.io
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          URLS=()
          if [ "$EVENT" = "workflow_dispatch" ]; then
            # 수동 실행 — 배포된 sitemap.xml에서 전체 URL 추출해 일괄 제출
            echo "수동 실행: 전체 사이트맵 URL 제출"
            mapfile -t URLS < <(curl -sS --retry 3 --max-time 30 "$SITE/sitemap.xml" \
              | grep -oE '<loc>[^<]+</loc>' | sed -E 's#</?loc>##g')
          else
            # push — 이번 푸시에서 추가·수정된 글만
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="${AFTER}^!"
            else
              RANGE="${BEFORE}..${AFTER}"
            fi
            FILES=$(git diff --name-only --diff-filter=AM "$RANGE" -- '_posts/*.md' || true)
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              # 파일명(YYYY-MM-DD-slug.md) → https://<site>/posts/<slug>/
              slug=$(basename "$f" .md | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-//')
              URLS+=("$SITE/posts/$slug/")
            done <<< "$FILES"
          fi

          if [ "${#URLS[@]}" -eq 0 ]; then
            echo "제출 대상 URL 없음 — 생략."
            exit 0
          fi
          echo "총 ${#URLS[@]}건 제출 (1000건씩 분할)"

          # IndexNow는 요청당 최대 1만 건 — 안전하게 1000건씩 끊어 전송
          total=${#URLS[@]}
          for ((i=0; i<total; i+=1000)); do
            CHUNK=("${URLS[@]:i:1000}")
            URLLIST=$(printf '%s\n' "${CHUNK[@]}" | jq -R . | jq -s .)
            BODY=$(jq -n \
              --arg host "parksangji.github.io" \
              --arg key "$INDEXNOW_KEY" \
              --arg keyLocation "$SITE/$INDEXNOW_KEY.txt" \
              --argjson urlList "$URLLIST" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')
            echo "배치 $((i/1000 + 1)): ${#CHUNK[@]}건 전송"
            curl -sS -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$BODY" -w "\nIndexNow HTTP %{http_code}\n"
          done
